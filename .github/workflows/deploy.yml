name: Deploy to Schubert

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Tailscale
        continue-on-error: true
        run: |
          set -x
          curl -fsSL https://tailscale.com/install.sh | sudo sh
          echo "Install exit: $?"

      - name: Start Tailscale daemon
        continue-on-error: true
        run: |
          set -x
          sudo tailscaled --state=/tmp/tailscaled.state &
          sleep 3
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --accept-routes --timeout=30s || echo "TAILSCALE UP EXIT: $?"
          sudo tailscale status || echo "STATUS FAILED"

      - name: Validate SSH key
        continue-on-error: true
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SCHUBERT_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "Key line count: $(wc -l < ~/.ssh/deploy_key)"
          echo "Key first line: $(head -1 ~/.ssh/deploy_key)"
          echo "Key last line: $(tail -1 ~/.ssh/deploy_key)"
          ssh-keygen -l -f ~/.ssh/deploy_key && echo "KEY VALID" || echo "KEY INVALID"

      - name: Test connectivity to Schubert
        continue-on-error: true
        run: |
          echo "Pinging 100.86.47.6 via Tailscale:"
          ping -c 3 100.86.47.6 || echo "PING FAILED"
          nc -zv -w 10 100.86.47.6 22 || echo "PORT 22 UNREACHABLE"

      - name: Deploy via Tailscale SSH
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            z121532@100.86.47.6 \
            "cd /opt/Project-Tango && sudo git pull origin main && sudo bash scripts/deploy.sh"
