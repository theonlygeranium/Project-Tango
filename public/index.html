<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Tango | Schubert</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        canvas { position: absolute; top: 0; left: 0; z-index: 0; }
        .content { position: relative; z-index: 1; text-align: center; max-width: 800px; padding: 2rem; background: rgba(0, 0, 0, 0.6); border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        h1 { font-size: 3.5rem; margin-bottom: 0.5rem; letter-spacing: -0.05em; }
        .badge { display: inline-block; padding: 0.25rem 0.75rem; background: #ffffff; color: #000000; border-radius: 999px; font-size: 0.875rem; font-weight: 600; margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
        p { font-size: 1.125rem; line-height: 1.6; color: #a0a0a0; margin-bottom: 2rem; }
        .footer { margin-top: 2rem; font-size: 0.875rem; color: #666666; }
    </style>
</head>
<body>
    <!-- E2E Verification -->
    <canvas id="starfield"></canvas>
    <div class="content">
        <div class="badge">Coming Soon</div>
        <h1>Project Tango</h1>
        <p>An AI-powered web application providing specialized voice agents for diverse tasks. Built on a modern voice framework prioritizing ultra-low latency and real-time transcriptions.</p>
        <div class="footer">Powered by Schubert Nexus</div>
    </div>
    <script>
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];
        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();
        for(let i=0; i<200; i++) stars.push({x: Math.random()*width, y: Math.random()*height, r: Math.random()*1.5, d: Math.random()*0.5+0.1});
        function draw() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#ffffff';
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
                s.y += s.d; if(s.y > height) s.y = 0;
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
